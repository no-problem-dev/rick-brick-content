name: Scheduled SNS Post

on:
  schedule:
    # JST 8,10,12,14,18,20,22 → UTC 23,01,03,05,09,11,13
    - cron: '0 23 * * *'   # JST 08:00
    - cron: '0 1 * * *'    # JST 10:00
    - cron: '0 3 * * *'    # JST 12:00
    - cron: '0 5 * * *'    # JST 14:00
    - cron: '45 9 * * *'   # JST 18:45
    - cron: '0 11 * * *'   # JST 20:00
    - cron: '0 13 * * *'   # JST 22:00
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'ドライラン'
        type: boolean
        default: false

jobs:
  post-sns:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'npm'
      - run: npm ci
      - name: Post to SNS
        run: npx tsx src/scripts/post-sns-scheduled.ts
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_APP_PASSWORD: ${{ secrets.BSKY_APP_PASSWORD }}
          MASTODON_INSTANCE_URL: ${{ secrets.MASTODON_INSTANCE_URL }}
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}

      - name: Commit post log updates
        if: ${{ inputs.dry_run != 'true' && inputs.dry_run != true }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sns-post-log.json
          if git diff --cached --quiet; then
            echo "No post log changes to commit."
          else
            git commit -m "chore: update SNS post log"
            git push
          fi
