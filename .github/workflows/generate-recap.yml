name: Generate Recap Articles

on:
  schedule:
    # 火曜 JST 18:00 (UTC 09:00) → ai-weekly-recap
    - cron: '0 9 * * 2'
    # 木曜 JST 18:00 (UTC 09:00) → extended-weekly-recap
    - cron: '0 9 * * 4'
    # 月末 JST 18:00 (UTC 09:00) → monthly-paper-recap
    # cron では月末を直接指定できないため 28-31日に実行し、ステップ内で月末判定
    - cron: '0 9 28-31 * *'
  workflow_dispatch:
    inputs:
      recap_type:
        description: '生成するまとめ記事の種類'
        required: false
        default: 'all-weekly'
        type: choice
        options:
          - ai-weekly-recap
          - extended-weekly-recap
          - monthly-paper-recap
          - all-weekly
      draft_mode:
        description: 'Draft モード（生成記事に draft: true を付与）'
        required: false
        type: boolean
        default: false
      dry_run:
        description: 'ドライラン（push・デプロイトリガーをスキップ）'
        required: false
        type: boolean
        default: false
      target_date:
        description: '記事の日付を上書き（YYYY-MM-DD 形式。空欄で当日）'
        required: false
        default: ''
        type: string

concurrency:
  group: recap-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate-recap:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_IMAGE_API_KEY: ${{ secrets.GEMINI_IMAGE_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      TARGET_DATE: ${{ inputs.target_date || '' }}

    steps:
      - name: Determine recap types to generate
        id: recap-routing
        if: env.SKIP_RUN != 'true' && github.event_name != 'workflow_dispatch'
        run: |
          DOW=$(TZ=Asia/Tokyo date +%u)  # 1=Mon, 2=Tue, ..., 7=Sun
          TOMORROW=$(TZ=Asia/Tokyo date -d "+1 day" +%d)
          IS_LAST_DAY=$( [ "$TOMORROW" = "01" ] && echo true || echo false )

          # 火曜 → ai-weekly-recap
          if [ "$DOW" = "2" ]; then
            echo "GEN_AI_WEEKLY=true" >> $GITHUB_ENV
          fi
          # 木曜 → extended-weekly-recap
          if [ "$DOW" = "4" ]; then
            echo "GEN_EXT_WEEKLY=true" >> $GITHUB_ENV
          fi
          # 月末（曜日問わず） → monthly-paper-recap
          if [ "$IS_LAST_DAY" = "true" ]; then
            echo "GEN_MONTHLY=true" >> $GITHUB_ENV
          fi

          # いずれにも該当しない（28-31日の月末以外）→ スキップ
          if [ "${GEN_AI_WEEKLY:-}" != "true" ] && [ "${GEN_EXT_WEEKLY:-}" != "true" ] && [ "${GEN_MONTHLY:-}" != "true" ]; then
            echo "SKIP_RUN=true" >> $GITHUB_ENV
            echo "::notice::Not a recap day (DOW=$DOW, IS_LAST_DAY=$IS_LAST_DAY). Skipping."
          fi

      - name: Checkout repository
        if: env.SKIP_RUN != 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: env.SKIP_RUN != 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'npm'

      - name: Install dependencies
        if: env.SKIP_RUN != 'true'
        run: npm ci

      - name: Pull latest articles
        if: env.SKIP_RUN != 'true'
        run: git pull origin main

      - name: Generate ai-weekly-recap
        if: >-
          env.SKIP_RUN != 'true' && (
            env.GEN_AI_WEEKLY == 'true' ||
            (github.event_name == 'workflow_dispatch' && (inputs.recap_type == 'ai-weekly-recap' || inputs.recap_type == 'all-weekly'))
          )
        run: npx tsx src/scripts/recap.ts
        env:
          RECAP_TYPE: ai-weekly-recap
          DRAFT_MODE: ${{ inputs.draft_mode || 'false' }}

      - name: Generate extended-weekly-recap
        if: >-
          env.SKIP_RUN != 'true' && (
            env.GEN_EXT_WEEKLY == 'true' ||
            (github.event_name == 'workflow_dispatch' && (inputs.recap_type == 'extended-weekly-recap' || inputs.recap_type == 'all-weekly'))
          )
        run: npx tsx src/scripts/recap.ts
        env:
          RECAP_TYPE: extended-weekly-recap
          DRAFT_MODE: ${{ inputs.draft_mode || 'false' }}

      - name: Generate monthly-paper-recap
        if: >-
          env.SKIP_RUN != 'true' && (
            env.GEN_MONTHLY == 'true' ||
            (github.event_name == 'workflow_dispatch' && inputs.recap_type == 'monthly-paper-recap')
          )
        run: npx tsx src/scripts/recap.ts
        env:
          RECAP_TYPE: monthly-paper-recap
          DRAFT_MODE: ${{ inputs.draft_mode || 'false' }}

      - name: Upload artifacts
        if: env.SKIP_RUN != 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: recap-articles-${{ env.TARGET_DATE || 'today' }}
          path: |
            .tmp/research-*.json
            articles/
            images/
          retention-days: 7

      - name: Post-generate pipeline
        if: env.SKIP_RUN != 'true'
        uses: ./.github/actions/post-generate
        with:
          draft_mode: ${{ inputs.draft_mode || 'false' }}
          dry_run: ${{ inputs.dry_run || 'false' }}
          target_date: ${{ env.TARGET_DATE }}
          commit_message: 'chore: auto-generate recap articles $(TZ=Asia/Tokyo date +%Y-%m-%d)'
          research_provider: ${{ env.RESEARCH_PROVIDER || 'claude' }}
          skip_translate: ${{ env.SKIP_TRANSLATE || 'false' }}
          deploy_trigger_pat: ${{ secrets.DEPLOY_TRIGGER_PAT }}
          git_push_token: ${{ secrets.DEPLOY_TRIGGER_PAT }}
          x_api_key: ${{ secrets.X_API_KEY }}
          x_api_secret: ${{ secrets.X_API_SECRET }}
          x_access_token: ${{ secrets.X_ACCESS_TOKEN }}
          x_access_token_secret: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          bsky_handle: ${{ secrets.BSKY_HANDLE }}
          bsky_app_password: ${{ secrets.BSKY_APP_PASSWORD }}
          mastodon_instance_url: ${{ secrets.MASTODON_INSTANCE_URL }}
          mastodon_access_token: ${{ secrets.MASTODON_ACCESS_TOKEN }}
