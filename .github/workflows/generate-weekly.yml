name: Generate Weekly Articles

on:
  schedule:
    # 月曜 JST 18:00 (UTC 09:00) → paper-review
    - cron: '0 9 * * 1'
    # 水曜 JST 18:00 (UTC 09:00) → extended-paper-review
    - cron: '0 9 * * 3'
    # 金曜 JST 18:00 (UTC 09:00) → community-trends
    - cron: '0 9 * * 5'
  workflow_dispatch:
    inputs:
      category:
        description: '生成するカテゴリ（空欄で全カテゴリ）'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - paper-review
          - extended-paper-review
          - community-trends
      provider:
        description: 'リサーチプロバイダー (claude / gemini / openai / mock)'
        required: false
        default: 'claude'
        type: choice
        options:
          - claude
          - gemini
          - openai
          - mock
      model:
        description: 'モデル上書き（空欄でデフォルト）'
        required: false
        default: ''
      draft_mode:
        description: 'Draft モード（生成記事に draft: true を付与）'
        required: false
        type: boolean
        default: false
      dry_run:
        description: 'ドライラン（push・デプロイトリガーをスキップ）'
        required: false
        type: boolean
        default: false
      slug_suffix:
        description: 'slug サフィックス（プロバイダー比較用。例: gemini → slug-gemini）'
        required: false
        default: ''
        type: string
      target_date:
        description: '記事の日付を上書き（YYYY-MM-DD 形式。空欄で当日）'
        required: false
        default: ''
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      ARTICLE_TYPE: weekly
      RESEARCH_PROVIDER: ${{ inputs.provider || '' }}
      RESEARCH_MODEL: ${{ inputs.model || '' }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_IMAGE_API_KEY: ${{ secrets.GEMINI_IMAGE_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SLUG_SUFFIX: ${{ inputs.slug_suffix || '' }}
      TARGET_DATE: ${{ inputs.target_date || '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Determine category from schedule
        run: |
          if [ -n "${{ inputs.category }}" ]; then
            echo "CATEGORY=${{ inputs.category }}" >> $GITHUB_ENV
            echo "::notice::Category from input: ${{ inputs.category }}"
          elif [ "${{ github.event.schedule }}" = "0 9 * * 1" ]; then
            echo "CATEGORY=paper-review" >> $GITHUB_ENV
            echo "::notice::Schedule: Monday → paper-review"
          elif [ "${{ github.event.schedule }}" = "0 9 * * 3" ]; then
            echo "CATEGORY=extended-paper-review" >> $GITHUB_ENV
            echo "::notice::Schedule: Wednesday → extended-paper-review"
          elif [ "${{ github.event.schedule }}" = "0 9 * * 5" ]; then
            echo "CATEGORY=community-trends" >> $GITHUB_ENV
            echo "::notice::Schedule: Friday → community-trends"
          fi

      - name: Determine research provider
        run: |
          if [ -n "$RESEARCH_PROVIDER" ]; then
            echo "::notice::Provider from input: $RESEARCH_PROVIDER"
          else
            # ISO 週番号の偶奇判定
            ISO_WEEK=$(TZ=Asia/Tokyo date +%V)
            if [ $(( 10#$ISO_WEEK % 2 )) -eq 0 ]; then
              echo "RESEARCH_PROVIDER=openai" >> $GITHUB_ENV
              echo "::notice::Auto-selected provider: openai (even week ISO: $ISO_WEEK)"
            else
              echo "RESEARCH_PROVIDER=gemini" >> $GITHUB_ENV
              echo "::notice::Auto-selected provider: gemini (odd week ISO: $ISO_WEEK)"
            fi
          fi

      - name: Pull latest articles
        run: git pull origin main

      - name: Run research
        run: npx tsx src/scripts/research.ts

      - name: Generate articles
        run: npx tsx src/scripts/generate.ts
        env:
          DRAFT_MODE: ${{ inputs.draft_mode || 'false' }}

      - name: Generate thumbnails
        run: npx tsx src/scripts/thumbnail.ts

      - name: Translate articles
        if: ${{ env.SKIP_TRANSLATE != 'true' }}
        run: npx tsx src/scripts/translate.ts
        env:
          RESEARCH_PROVIDER: ${{ env.RESEARCH_PROVIDER }}

      - name: Validate articles
        run: npx tsx src/scripts/validate.ts

      - name: Upload artifacts (dry_run)
        if: ${{ inputs.dry_run }}
        uses: actions/upload-artifact@v4
        with:
          name: weekly-articles-${{ env.TARGET_DATE || 'today' }}
          path: |
            articles/
            images/
          retention-days: 7

      - name: Publish articles (remove draft flag from newly generated only)
        if: ${{ !inputs.draft_mode }}
        run: |
          TODAY="${TARGET_DATE:-$(TZ=Asia/Tokyo date +%Y-%m-%d)}"
          for file in articles/ja/${TODAY}-*.md; do
            if [ -f "$file" ] && grep -q "^draft: true$" "$file" 2>/dev/null; then
              sed -i '/^draft: true$/d' "$file"
              echo "Published: $file"
            fi
          done
          for lang in en zh es pt fr; do
            for file in articles/${lang}/${TODAY}-*.md; do
              if [ -f "$file" ] && grep -q "^draft: true$" "$file" 2>/dev/null; then
                sed -i '/^draft: true$/d' "$file"
                echo "Published: $file"
              fi
            done
          done

      - name: Commit and push
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles/ images/
          if git diff --staged --quiet; then
            echo "No new articles generated"
            exit 0
          fi
          git commit -m "chore: auto-generate weekly articles $(TZ=Asia/Tokyo date +%Y-%m-%d)"
          git push origin main

      - name: Trigger deploy
        if: ${{ !inputs.dry_run }}
        run: npx tsx src/scripts/trigger-deploy.ts
        env:
          DEPLOY_TRIGGER_PAT: ${{ secrets.DEPLOY_TRIGGER_PAT }}

      - name: Post to X
        if: ${{ !inputs.dry_run }}
        continue-on-error: true
        run: npx tsx src/scripts/post-to-x.ts
        env:
          TARGET_DATE: ${{ env.TARGET_DATE }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
