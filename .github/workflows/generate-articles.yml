name: Generate Articles

on:
  schedule:
    # 毎日 UTC 20:00 (JST 05:00) に実行
    - cron: '0 20 * * *'
  workflow_dispatch:
    inputs:
      provider:
        description: 'リサーチプロバイダー (claude / gemini / openai / mock)'
        required: false
        default: 'claude'
        type: choice
        options:
          - claude
          - gemini
          - openai
          - mock
      model:
        description: 'モデル上書き（空欄でデフォルト）'
        required: false
        default: ''
      draft_mode:
        description: 'Draft モード（生成記事に draft: true を付与）'
        required: false
        type: boolean
        default: false
      dry_run:
        description: 'ドライラン（push・デプロイトリガーをスキップ）'
        required: false
        type: boolean
        default: false
      slug_suffix:
        description: 'slug サフィックス（プロバイダー比較用。例: gemini → slug-gemini）'
        required: false
        default: ''
        type: string
      generate_summary:
        description: 'Generate weekly summary (regardless of day)'
        type: boolean
        default: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      RESEARCH_PROVIDER: ${{ inputs.provider || '' }}
      RESEARCH_MODEL: ${{ inputs.model || '' }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_IMAGE_API_KEY: ${{ secrets.GEMINI_IMAGE_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SLUG_SUFFIX: ${{ inputs.slug_suffix || '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Determine research provider
        run: |
          if [ -n "$RESEARCH_PROVIDER" ]; then
            echo "::notice::Provider from input: $RESEARCH_PROVIDER"
          else
            DAYS_SINCE_EPOCH=$(( $(date -u +%s) / 86400 ))
            if [ $(( DAYS_SINCE_EPOCH % 2 )) -eq 0 ]; then
              echo "RESEARCH_PROVIDER=openai" >> $GITHUB_ENV
              echo "::notice::Auto-selected provider: openai (even day)"
            else
              echo "RESEARCH_PROVIDER=gemini" >> $GITHUB_ENV
              echo "::notice::Auto-selected provider: gemini (odd day)"
            fi
          fi

      - name: Run research
        run: npx tsx src/scripts/research.ts

      - name: Generate articles
        run: npx tsx src/scripts/generate.ts
        env:
          DRAFT_MODE: ${{ inputs.draft_mode || 'false' }}

      - name: Generate thumbnails
        run: npx tsx src/scripts/thumbnail.ts

      - name: Validate articles
        run: npx tsx src/scripts/validate.ts

      - name: Publish articles (remove draft flag from newly generated only)
        if: ${{ !inputs.draft_mode }}
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          for file in articles/${TODAY}-*.md; do
            if [ -f "$file" ] && grep -q "^draft: true$" "$file" 2>/dev/null; then
              sed -i '/^draft: true$/d' "$file"
              echo "Published: $file"
            fi
          done

      - name: Commit and push
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles/ images/
          if git diff --staged --quiet; then
            echo "No new articles generated"
            exit 0
          fi
          git commit -m "chore: auto-generate articles $(date -u +%Y-%m-%d)"
          git push origin main

      - name: Trigger deploy
        if: ${{ !inputs.dry_run }}
        run: npx tsx src/scripts/trigger-deploy.ts
        env:
          DEPLOY_TRIGGER_PAT: ${{ secrets.DEPLOY_TRIGGER_PAT }}

  generate-weekly-summary:
    needs: generate
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: >-
      (github.event_name == 'schedule') ||
      (github.event_name == 'workflow_dispatch' && inputs.generate_summary == true)
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_IMAGE_API_KEY: ${{ secrets.GEMINI_IMAGE_API_KEY }}

    steps:
      - name: Check if Monday (skip on non-Monday for schedule)
        id: check-day
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run_summary=true" >> $GITHUB_OUTPUT
          else
            DOW=$(date -u +%u)
            if [ "$DOW" -eq 1 ]; then
              echo "run_summary=true" >> $GITHUB_OUTPUT
            else
              echo "run_summary=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Checkout
        if: steps.check-day.outputs.run_summary == 'true'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.DEPLOY_TRIGGER_PAT || github.token }}

      - name: Setup Node.js
        if: steps.check-day.outputs.run_summary == 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'

      - name: Install dependencies
        if: steps.check-day.outputs.run_summary == 'true'
        run: npm ci

      - name: Pull latest articles
        if: steps.check-day.outputs.run_summary == 'true'
        run: git pull origin main

      - name: Generate weekly summary
        if: steps.check-day.outputs.run_summary == 'true'
        run: npx tsx src/scripts/weekly-summary.ts
        env:
          DRAFT_MODE: ${{ inputs.draft_mode || 'false' }}

      - name: Generate thumbnail
        if: steps.check-day.outputs.run_summary == 'true'
        run: npx tsx src/scripts/thumbnail.ts

      - name: Validate
        if: steps.check-day.outputs.run_summary == 'true'
        run: npx tsx src/scripts/validate.ts
        continue-on-error: true

      - name: Publish articles
        if: steps.check-day.outputs.run_summary == 'true' && !inputs.draft_mode
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          for file in articles/${TODAY}-*.md; do
            if [ -f "$file" ] && grep -q "^draft: true$" "$file" 2>/dev/null; then
              sed -i '/^draft: true$/d' "$file"
              echo "Published: $file"
            fi
          done

      - name: Commit and push
        if: steps.check-day.outputs.run_summary == 'true' && !inputs.dry_run
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles/ images/
          if git diff --staged --quiet; then
            echo "No weekly summary generated"
            exit 0
          fi
          git commit -m "docs: add weekly summary $(date -u +%Y-%m-%d)"
          git push origin main

      - name: Trigger deploy
        if: steps.check-day.outputs.run_summary == 'true' && !inputs.dry_run
        run: npx tsx src/scripts/trigger-deploy.ts
        env:
          DEPLOY_TRIGGER_PAT: ${{ secrets.DEPLOY_TRIGGER_PAT }}
