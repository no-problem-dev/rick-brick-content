name: Post English Articles to SNS

on:
  schedule:
    # UTC 16:00 = US Eastern 12:00 (EDT)
    - cron: '0 16 * * *'
  workflow_dispatch:
    inputs:
      target_date:
        description: '投稿対象の記事日付 (YYYY-MM-DD)。空欄で JST 当日を自動判定'
        required: false
        default: ''
        type: string
      dry_run:
        description: 'ドライラン（投稿をスキップしログのみ出力）'
        required: false
        type: boolean
        default: false

jobs:
  post-sns:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Post to Bluesky
        continue-on-error: true
        run: npx tsx src/scripts/post-to-bluesky.ts
        env:
          TARGET_DATE: ${{ inputs.target_date || '' }}
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_APP_PASSWORD: ${{ secrets.BSKY_APP_PASSWORD }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}

      - name: Post to Mastodon
        continue-on-error: true
        run: npx tsx src/scripts/post-to-mastodon.ts
        env:
          TARGET_DATE: ${{ inputs.target_date || '' }}
          MASTODON_INSTANCE_URL: ${{ secrets.MASTODON_INSTANCE_URL }}
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
