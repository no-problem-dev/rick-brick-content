name: Generate Daily Articles

on:
  schedule:
    # 毎日 UTC 20:00 (JST 05:00) に実行
    - cron: '0 20 * * *'
  workflow_dispatch:
    inputs:
      provider:
        description: 'リサーチプロバイダー (claude / gemini / openai / mock)'
        required: false
        default: 'openai'
        type: choice
        options:
          - openai
          - gemini
          - claude
          - mock
      model:
        description: 'モデル上書き（空欄でデフォルト）'
        required: false
        default: ''
      draft_mode:
        description: 'Draft モード（生成記事に draft: true を付与）'
        required: false
        type: boolean
        default: false
      dry_run:
        description: 'ドライラン（push・デプロイトリガーをスキップ）'
        required: false
        type: boolean
        default: false
      slug_suffix:
        description: 'slug サフィックス（プロバイダー比較用。例: gemini → slug-gemini）'
        required: false
        default: ''
        type: string
      target_date:
        description: '記事の日付を上書き（YYYY-MM-DD 形式。空欄で当日）'
        required: false
        default: ''
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      ARTICLE_TYPE: daily
      RESEARCH_PROVIDER: ${{ inputs.provider || '' }}
      RESEARCH_MODEL: ${{ inputs.model || '' }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_IMAGE_API_KEY: ${{ secrets.GEMINI_IMAGE_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SLUG_SUFFIX: ${{ inputs.slug_suffix || '' }}
      TARGET_DATE: ${{ inputs.target_date || '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Determine research provider
        run: |
          if [ -n "$RESEARCH_PROVIDER" ]; then
            echo "::notice::Provider from input: $RESEARCH_PROVIDER"
          else
            # JST基準の日付で偶奇判定（cron は UTC 20:00 = JST 翌05:00 に実行）
            JST_DAY=$(TZ=Asia/Tokyo date +%-d)
            if [ $(( JST_DAY % 2 )) -eq 0 ]; then
              echo "RESEARCH_PROVIDER=openai" >> $GITHUB_ENV
              echo "::notice::Auto-selected provider: openai (even day JST: $JST_DAY)"
            else
              echo "RESEARCH_PROVIDER=gemini" >> $GITHUB_ENV
              echo "::notice::Auto-selected provider: gemini (odd day JST: $JST_DAY)"
            fi
          fi

      - name: Pull latest articles
        run: git pull origin main

      - name: Run research
        run: npx tsx src/scripts/research.ts

      - name: Generate articles
        run: npx tsx src/scripts/generate.ts
        env:
          DRAFT_MODE: ${{ inputs.draft_mode || 'false' }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-articles-${{ env.TARGET_DATE || 'today' }}
          path: |
            .tmp/research-*.json
            articles/
            images/
          retention-days: 7

      - name: Post-generate pipeline
        uses: ./.github/actions/post-generate
        with:
          draft_mode: ${{ inputs.draft_mode || 'false' }}
          dry_run: ${{ inputs.dry_run || 'false' }}
          target_date: ${{ env.TARGET_DATE }}
          commit_message: 'chore: auto-generate daily articles $(TZ=Asia/Tokyo date +%Y-%m-%d)'
          research_provider: ${{ env.RESEARCH_PROVIDER }}
          skip_translate: ${{ env.SKIP_TRANSLATE || 'false' }}
          deploy_trigger_pat: ${{ secrets.DEPLOY_TRIGGER_PAT }}
          git_push_token: ${{ secrets.DEPLOY_TRIGGER_PAT }}
          x_api_key: ${{ secrets.X_API_KEY }}
          x_api_secret: ${{ secrets.X_API_SECRET }}
          x_access_token: ${{ secrets.X_ACCESS_TOKEN }}
          x_access_token_secret: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          bsky_handle: ${{ secrets.BSKY_HANDLE }}
          bsky_app_password: ${{ secrets.BSKY_APP_PASSWORD }}
          mastodon_instance_url: ${{ secrets.MASTODON_INSTANCE_URL }}
          mastodon_access_token: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
